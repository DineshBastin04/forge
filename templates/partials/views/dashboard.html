      <!-- ══ DASHBOARD ══ -->
      <div x-show="view==='dashboard'">

        <!-- ── Agent Activity Carousel (C-01) ──────────────────────────────── -->
        <div class="card mb-6 overflow-hidden p-0">
          <div class="overflow-hidden">
            <div class="flex transition-transform duration-300 ease-in-out"
                 :style="`transform:translateX(-${dash.carouselIdx*100}%)`">

              <!-- SLIDE 1 — Device Reset -->
              <div class="min-w-full flex flex-col sm:flex-row items-center gap-6 p-6">
                <!-- Donut -->
                <div class="relative flex-shrink-0">
                  <svg viewBox="0 0 120 120" class="w-36 h-36" style="transform:rotate(-90deg)">
                    <circle cx="60" cy="60" r="48" fill="none" stroke="#e2e8f0" stroke-width="14"/>
                    <!-- segments — always rendered, da='0 302' when value is 0 -->
                    <circle cx="60" cy="60" r="48" fill="none" stroke="#10b981" stroke-width="14"
                      :stroke-dasharray="dash.donut?.device_reset?.segs[0]?.da ?? '0 302'"
                      :stroke-dashoffset="dash.donut?.device_reset?.segs[0]?.do ?? 0"/>
                    <circle cx="60" cy="60" r="48" fill="none" stroke="#f59e0b" stroke-width="14"
                      :stroke-dasharray="dash.donut?.device_reset?.segs[1]?.da ?? '0 302'"
                      :stroke-dashoffset="dash.donut?.device_reset?.segs[1]?.do ?? 0"/>
                    <circle cx="60" cy="60" r="48" fill="none" stroke="#ef4444" stroke-width="14"
                      :stroke-dasharray="dash.donut?.device_reset?.segs[2]?.da ?? '0 302'"
                      :stroke-dashoffset="dash.donut?.device_reset?.segs[2]?.do ?? 0"/>
                  </svg>
                  <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                    <span class="text-2xl font-bold text-slate-800 dark:text-slate-100 leading-none"
                          x-text="dash.statsLoading?'…':(dash.donut?.device_reset?.total??'0')"></span>
                    <span class="text-xs text-slate-400 mt-0.5">runs 7d</span>
                  </div>
                </div>

                <!-- Details -->
                <div class="flex-1 w-full min-w-0">
                  <div class="flex items-center gap-2 mb-4 flex-wrap">
                    <div class="w-8 h-8 bg-indigo-100 dark:bg-indigo-900/40 rounded-lg flex items-center justify-center flex-shrink-0">
                      <svg class="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                    </div>
                    <span class="font-semibold text-slate-800 dark:text-slate-100">Device Reset Agent</span>
                    <span class="badge text-xs" :class="dr.schedulerInfo&&dr.schedulerInfo.running&&!dr.schedulerInfo.paused?'bg-emerald-100 text-emerald-700':'bg-amber-100 text-amber-700'"
                          x-text="dr.schedulerInfo?(dr.schedulerInfo.running&&!dr.schedulerInfo.paused?'Running':'Paused'):'—'"></span>
                  </div>
                  <!-- Scheduler mini-row -->
                  <div class="grid grid-cols-2 gap-2 mb-4 text-sm">
                    <div>
                      <div class="text-xs text-slate-500 mb-0.5">Interval</div>
                      <div class="font-semibold text-slate-800 dark:text-slate-100" x-text="dr.schedulerInfo?.interval_hours?dr.schedulerInfo.interval_hours+'h':'—'"></div>
                    </div>
                    <div>
                      <div class="text-xs text-slate-500 mb-0.5">Next Run</div>
                      <div class="font-semibold text-slate-700 dark:text-slate-300 text-xs leading-tight" x-text="dr.schedulerInfo?.next_run?fmtDateTZ(dr.schedulerInfo.next_run):'—'"></div>
                    </div>
                  </div>
                  <!-- Outcome legend -->
                  <div class="space-y-2">
                    <div class="flex items-center justify-between text-sm">
                      <div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-emerald-500 flex-shrink-0"></span><span class="text-slate-600 dark:text-slate-400">Successful</span></div>
                      <span class="font-semibold text-slate-800 dark:text-slate-100" x-text="dash.stats?.device_reset?.success_runs_week??'—'"></span>
                    </div>
                    <div class="flex items-center justify-between text-sm">
                      <div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-amber-500 flex-shrink-0"></span><span class="text-slate-600 dark:text-slate-400">Warnings</span></div>
                      <span class="font-semibold text-slate-800 dark:text-slate-100" x-text="dash.stats?.device_reset?.warning_runs_week??'—'"></span>
                    </div>
                    <div class="flex items-center justify-between text-sm">
                      <div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-red-500 flex-shrink-0"></span><span class="text-slate-600 dark:text-slate-400">Errors</span></div>
                      <span class="font-semibold" :class="(dash.stats?.device_reset?.error_runs_week||0)>0?'text-red-600':'text-slate-800 dark:text-slate-100'" x-text="dash.stats?.device_reset?.error_runs_week??'—'"></span>
                    </div>
                  </div>
                  <!-- Bottom stats + CTA -->
                  <div class="mt-3 pt-3 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between">
                    <div class="flex gap-4 text-sm">
                      <div><span class="text-xs text-slate-500">Today </span><span class="font-semibold text-slate-800 dark:text-slate-100" x-text="dash.stats?.device_reset?.runs_today??'—'"></span></div>
                      <div><span class="text-xs text-slate-500">Resets 7d </span><span class="font-semibold text-emerald-700" x-text="dash.stats?.device_reset?.records_week??'—'"></span></div>
                    </div>
                    <button x-show="hasAgentPerm('device_reset')" class="btn-secondary btn-sm text-xs" @click="nav('device-reset')">Open →</button>
                  </div>
                </div>
              </div>

              <!-- SLIDE 2 — Unpick Agent -->
              <div class="min-w-full flex flex-col sm:flex-row items-center gap-6 p-6">
                <div class="relative flex-shrink-0">
                  <svg viewBox="0 0 120 120" class="w-36 h-36" style="transform:rotate(-90deg)">
                    <circle cx="60" cy="60" r="48" fill="none" stroke="#e2e8f0" stroke-width="14"/>
                    <circle cx="60" cy="60" r="48" fill="none" stroke="#10b981" stroke-width="14"
                      :stroke-dasharray="dash.donut?.unpick?.segs[0]?.da ?? '0 302'"
                      :stroke-dashoffset="dash.donut?.unpick?.segs[0]?.do ?? 0"/>
                    <circle cx="60" cy="60" r="48" fill="none" stroke="#f59e0b" stroke-width="14"
                      :stroke-dasharray="dash.donut?.unpick?.segs[1]?.da ?? '0 302'"
                      :stroke-dashoffset="dash.donut?.unpick?.segs[1]?.do ?? 0"/>
                    <circle cx="60" cy="60" r="48" fill="none" stroke="#ef4444" stroke-width="14"
                      :stroke-dasharray="dash.donut?.unpick?.segs[2]?.da ?? '0 302'"
                      :stroke-dashoffset="dash.donut?.unpick?.segs[2]?.do ?? 0"/>
                  </svg>
                  <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                    <span class="text-2xl font-bold text-slate-800 dark:text-slate-100 leading-none"
                          x-text="dash.statsLoading?'…':(dash.donut?.unpick?.total??'0')"></span>
                    <span class="text-xs text-slate-400 mt-0.5">runs 7d</span>
                  </div>
                </div>

                <div class="flex-1 w-full min-w-0">
                  <div class="flex items-center gap-2 mb-4 flex-wrap">
                    <div class="w-8 h-8 bg-indigo-100 dark:bg-indigo-900/40 rounded-lg flex items-center justify-center flex-shrink-0">
                      <svg class="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    </div>
                    <span class="font-semibold text-slate-800 dark:text-slate-100">Unpick Agent</span>
                    <span class="badge text-xs" :class="up.schedulerInfo&&up.schedulerInfo.running&&!up.schedulerInfo.paused?'bg-emerald-100 text-emerald-700':'bg-amber-100 text-amber-700'"
                          x-text="up.schedulerInfo?(up.schedulerInfo.running&&!up.schedulerInfo.paused?'Running':'Paused'):'—'"></span>
                  </div>
                  <div class="grid grid-cols-2 gap-2 mb-4 text-sm">
                    <div>
                      <div class="text-xs text-slate-500 mb-0.5">Interval</div>
                      <div class="font-semibold text-slate-800 dark:text-slate-100" x-text="up.schedulerInfo?.interval_hours?up.schedulerInfo.interval_hours+'h':'—'"></div>
                    </div>
                    <div>
                      <div class="text-xs text-slate-500 mb-0.5">Next Run</div>
                      <div class="font-semibold text-slate-700 dark:text-slate-300 text-xs leading-tight" x-text="up.schedulerInfo?.next_run?fmtDateTZ(up.schedulerInfo.next_run):'—'"></div>
                    </div>
                  </div>
                  <div class="space-y-2">
                    <div class="flex items-center justify-between text-sm">
                      <div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-emerald-500 flex-shrink-0"></span><span class="text-slate-600 dark:text-slate-400">Successful</span></div>
                      <span class="font-semibold text-slate-800 dark:text-slate-100" x-text="dash.stats?.unpick?.success_runs_week??'—'"></span>
                    </div>
                    <div class="flex items-center justify-between text-sm">
                      <div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-amber-500 flex-shrink-0"></span><span class="text-slate-600 dark:text-slate-400">Warnings</span></div>
                      <span class="font-semibold text-slate-800 dark:text-slate-100" x-text="dash.stats?.unpick?.warning_runs_week??'—'"></span>
                    </div>
                    <div class="flex items-center justify-between text-sm">
                      <div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-red-500 flex-shrink-0"></span><span class="text-slate-600 dark:text-slate-400">Errors</span></div>
                      <span class="font-semibold" :class="(dash.stats?.unpick?.error_runs_week||0)>0?'text-red-600':'text-slate-800 dark:text-slate-100'" x-text="dash.stats?.unpick?.error_runs_week??'—'"></span>
                    </div>
                  </div>
                  <div class="mt-3 pt-3 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between">
                    <div class="flex gap-4 text-sm">
                      <div><span class="text-xs text-slate-500">Today </span><span class="font-semibold text-slate-800 dark:text-slate-100" x-text="dash.stats?.unpick?.runs_today??'—'"></span></div>
                      <div><span class="text-xs text-slate-500">Unpicked 7d </span><span class="font-semibold text-emerald-700" x-text="dash.stats?.unpick?.records_week??'—'"></span></div>
                    </div>
                    <button x-show="hasAgentPerm('unpick')" class="btn-secondary btn-sm text-xs" @click="nav('unpick')">Open →</button>
                  </div>
                </div>
              </div>

            </div><!-- /track -->
          </div><!-- /overflow-hidden -->

          <!-- Footer: prev · dots · next -->
          <div class="flex items-center justify-between px-5 py-3 border-t border-slate-100 dark:border-slate-800">
            <button class="btn-secondary btn-sm text-xs disabled:opacity-40" @click="dash.carouselIdx=0" :disabled="dash.carouselIdx===0">← Device Reset</button>
            <div class="flex gap-2 items-center">
              <button class="h-2 rounded-full bg-indigo-500 transition-all duration-300"
                      :class="dash.carouselIdx===0?'w-5':'w-2 opacity-30 hover:opacity-60'"
                      @click="dash.carouselIdx=0"></button>
              <button class="h-2 rounded-full bg-indigo-500 transition-all duration-300"
                      :class="dash.carouselIdx===1?'w-5':'w-2 opacity-30 hover:opacity-60'"
                      @click="dash.carouselIdx=1"></button>
            </div>
            <button class="btn-secondary btn-sm text-xs disabled:opacity-40" @click="dash.carouselIdx=1" :disabled="dash.carouselIdx===1">Unpick Agent →</button>
          </div>
        </div>

        <!-- Recent runs feed (C-02) -->
        <div class="card mb-6">
          <div class="flex items-center justify-between mb-3">
            <div class="text-sm font-medium text-slate-600 dark:text-slate-400">Recent runs</div>
            <button class="btn-secondary btn-sm text-xs" @click="dashLoadRecentRuns()">↻ Refresh</button>
          </div>
          <div x-show="dash.runsLoading" class="text-slate-500 text-sm p-2">Loading…</div>
          <div x-show="!dash.runsLoading&&dash.recentRuns.length===0" class="text-slate-500 text-sm">No runs recorded yet.</div>
          <div x-show="!dash.runsLoading&&dash.recentRuns.length>0" class="overflow-x-auto">
            <table class="min-w-full">
              <thead><tr><th class="th">Agent</th><th class="th">Run ID</th><th class="th">Status</th><th class="th">Records</th><th class="th">Started</th></tr></thead>
              <tbody>
                <template x-for="(r,i) in dash.recentRuns" :key="i">
                  <tr>
                    <td class="td text-sm" x-text="r.log_type==='device_reset'?'Device Reset':'Unpick'"></td>
                    <td class="td font-mono text-xs text-slate-400" x-text="r.run_id||'—'"></td>
                    <td class="td"><span class="badge" :class="statusBadge(r.status)" x-text="r.status"></span></td>
                    <td class="td text-sm" x-text="r.records"></td>
                    <td class="td text-xs text-slate-500 whitespace-nowrap" :title="r.started_at" x-text="relTime(r.started_at)"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Quick actions -->
        <div class="card">
          <div class="text-sm font-medium text-slate-600 dark:text-slate-400 mb-4">Quick actions</div>
          <div class="flex flex-wrap gap-3">
            <button x-show="hasAgentPerm('device_reset')" class="btn-secondary" @click="nav('device-reset')">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
              Device Reset Scan
            </button>
            <button x-show="hasAgentPerm('unpick')" class="btn-secondary" @click="nav('unpick')">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
              Unpick Scan
            </button>
            <button x-show="isAdmin()" class="btn-secondary" @click="nav('users')">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
              Manage Users
            </button>
            <button x-show="isAdmin()" class="btn-secondary" @click="nav('audit-logs')">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
              Audit Logs
            </button>
          </div>
        </div>
      </div>
