      <!-- ══ DASHBOARD ══ -->
      <div x-show="view==='dashboard'">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
          <!-- Device Reset scheduler card -->
          <div class="card">
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-100 rounded-lg flex items-center justify-center">
                  <svg class="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <span class="font-semibold text-slate-800 dark:text-slate-100 text-sm">Device Reset Agent</span>
              </div>
              <span class="badge text-xs" :class="dr.schedulerInfo&&dr.schedulerInfo.running&&!dr.schedulerInfo.paused?'bg-emerald-100 text-emerald-700':'bg-amber-100 text-amber-700'" x-text="dr.schedulerInfo?(dr.schedulerInfo.running&&!dr.schedulerInfo.paused?'Running':'Paused'):'Unavailable'"></span>
            </div>
            <div class="grid grid-cols-2 gap-3 text-sm">
              <div>
                <div class="text-xs text-slate-500 mb-0.5">Interval</div>
                <div class="font-semibold text-slate-800 dark:text-slate-100" x-text="dr.schedulerInfo&&dr.schedulerInfo.interval_hours?dr.schedulerInfo.interval_hours+'h':'—'"></div>
              </div>
              <div>
                <div class="text-xs text-slate-500 mb-0.5">Next Run</div>
                <div class="font-semibold text-slate-800 dark:text-slate-100 text-xs" x-text="dr.schedulerInfo&&dr.schedulerInfo.next_run?relTime(dr.schedulerInfo.next_run):'—'"></div>
              </div>
            </div>
            <div class="mt-3 flex gap-2" x-show="hasAgentPerm('device_reset')">
              <button class="btn-secondary btn-sm" @click="nav('device-reset')">Open Agent →</button>
            </div>
          </div>
          <!-- Unpick scheduler card -->
          <div class="card">
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-100 rounded-lg flex items-center justify-center">
                  <svg class="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                </div>
                <span class="font-semibold text-slate-800 dark:text-slate-100 text-sm">Unpick Agent</span>
              </div>
              <span class="badge text-xs" :class="up.schedulerInfo&&up.schedulerInfo.running&&!up.schedulerInfo.paused?'bg-emerald-100 text-emerald-700':'bg-amber-100 text-amber-700'" x-text="up.schedulerInfo?(up.schedulerInfo.running&&!up.schedulerInfo.paused?'Running':'Paused'):'Unavailable'"></span>
            </div>
            <div class="grid grid-cols-2 gap-3 text-sm">
              <div>
                <div class="text-xs text-slate-500 mb-0.5">Interval</div>
                <div class="font-semibold text-slate-800 dark:text-slate-100" x-text="up.schedulerInfo&&up.schedulerInfo.interval_hours?up.schedulerInfo.interval_hours+'h':'—'"></div>
              </div>
              <div>
                <div class="text-xs text-slate-500 mb-0.5">Next Run</div>
                <div class="font-semibold text-slate-800 dark:text-slate-100 text-xs" x-text="up.schedulerInfo&&up.schedulerInfo.next_run?relTime(up.schedulerInfo.next_run):'—'"></div>
              </div>
            </div>
            <div class="mt-3 flex gap-2" x-show="hasAgentPerm('unpick')">
              <button class="btn-secondary btn-sm" @click="nav('unpick')">Open Agent →</button>
            </div>
          </div>
        </div>
        <!-- Quick actions -->
        <div class="card">
          <div class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-4">Quick Actions</div>
          <div class="flex flex-wrap gap-3">
            <button x-show="hasAgentPerm('device_reset')" class="btn-secondary" @click="nav('device-reset')">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
              Device Reset Scan
            </button>
            <button x-show="hasAgentPerm('unpick')" class="btn-secondary" @click="nav('unpick')">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
              Unpick Scan
            </button>
            <button x-show="isAdmin()" class="btn-secondary" @click="nav('users')">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
              Manage Users
            </button>
            <button x-show="isAdmin()" class="btn-secondary" @click="nav('audit-logs')">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
              Audit Logs
            </button>
          </div>
        </div>
      </div>
